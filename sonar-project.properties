# =====================================================
# SonarQube Configuration for Fabric Pipeline Automation
# =====================================================

# Project identification
sonar.projectKey=fabric-data-pipeline-automation
sonar.projectName=Fabric Data Pipeline Automation
sonar.projectVersion=1.0

# Source code directories
sonar.sources=backend,frontend/src
# sonar.tests=backend/tests  # Commented out - no tests directory yet

# Language-specific settings
# Python (Backend)
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# JavaScript/TypeScript (Frontend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions - Files and directories to exclude from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  **/coverage/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/venv/**,\
  **/env/**,\
  **/.pytest_cache/**,\
  **/frontend/public/**,\
  **/frontend/build/**,\
  **/.next/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/Dockerfile,\
  **/docker-compose.yml,\
  **/.gitignore,\
  **/.dockerignore,\
  **/settings.py

# Test exclusions
sonar.test.exclusions=\
  **/tests/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.js,\
  **/*.spec.jsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Coverage exclusions - Files to exclude from coverage metrics
sonar.coverage.exclusions=\
  **/tests/**,\
  **/__tests__/**,\
  **/test_*.py,\
  **/*_test.py,\
  **/conftest.py,\
  **/setup.py,\
  **/manage.py,\
  **/wsgi.py,\
  **/asgi.py,\
  **/migrations/**,\
  **/config/**,\
  **/settings.py

# Encoding
sonar.sourceEncoding=UTF-8

# SCM settings
sonar.scm.provider=git
sonar.scm.exclusions.disabled=false

# Analysis parameters
sonar.qualitygate.wait=false
sonar.verbose=false
