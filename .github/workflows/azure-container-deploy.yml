name: Fabric Pipeline Automation - Azure Container Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main

jobs:
  CodeTesting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Directory Structure
        run: ls -R backend

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Create Test Directory if Not Exists
        run: mkdir -p backend/tests && touch backend/tests/__init__.py

      - name: Run Pytest with Coverage
        run: pytest backend/tests --cov=backend --cov-report=xml || echo "Tests completed"

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

  SonarQubeAnalysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Fetch SonarQube Analysis Results
        id: sonar-results
        continue-on-error: true
        run: |
          # Wait for SonarQube to process the analysis
          sleep 10

          # Fetch project status from SonarQube API
          SONAR_URL="${{ secrets.SONAR_HOST_URL }}"
          PROJECT_KEY="fabric-data-pipeline-automation"

          # Get quality gate status
          QUALITY_GATE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${SONAR_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" \
            | jq -r '.projectStatus.status // "UNKNOWN"')

          # Get metrics
          METRICS=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${SONAR_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,security_hotspots" \
            | jq -r '.component.measures')

          # Parse metrics
          BUGS=$(echo "$METRICS" | jq -r '.[] | select(.metric=="bugs") | .value // "N/A"')
          VULNERABILITIES=$(echo "$METRICS" | jq -r '.[] | select(.metric=="vulnerabilities") | .value // "N/A"')
          CODE_SMELLS=$(echo "$METRICS" | jq -r '.[] | select(.metric=="code_smells") | .value // "N/A"')
          COVERAGE=$(echo "$METRICS" | jq -r '.[] | select(.metric=="coverage") | .value // "N/A"')
          DUPLICATIONS=$(echo "$METRICS" | jq -r '.[] | select(.metric=="duplicated_lines_density") | .value // "N/A"')
          HOTSPOTS=$(echo "$METRICS" | jq -r '.[] | select(.metric=="security_hotspots") | .value // "N/A"')

          # Store in environment for summary
          echo "QUALITY_GATE=${QUALITY_GATE}" >> $GITHUB_ENV
          echo "BUGS=${BUGS}" >> $GITHUB_ENV
          echo "VULNERABILITIES=${VULNERABILITIES}" >> $GITHUB_ENV
          echo "CODE_SMELLS=${CODE_SMELLS}" >> $GITHUB_ENV
          echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "DUPLICATIONS=${DUPLICATIONS}" >> $GITHUB_ENV
          echo "HOTSPOTS=${HOTSPOTS}" >> $GITHUB_ENV

          # Create summary output
          echo "## SonarQube Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quality Gate Status:** ${QUALITY_GATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bugs | ${BUGS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerabilities | ${VULNERABILITIES} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Smells | ${CODE_SMELLS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Duplications | ${DUPLICATIONS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Hotspots | ${HOTSPOTS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Detailed Report in SonarQube](${SONAR_URL}/dashboard?id=${PROJECT_KEY})" >> $GITHUB_STEP_SUMMARY

          echo "✅ SonarQube analysis complete. Deployment will continue regardless of quality gate status."

  BackendDeployment:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-jay')
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      BACKEND_APP_NAME: "fabric-pipeline-backend"
      ENVIRONMENT_NAME: ${{ secrets.CONTAINER_ENV_NAME }}
      ACR_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      REGION: "eastus"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Image Tag with Timestamp
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure ACR Exists
        run: |
          if ! az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            echo "Creating ACR..."
            az acr create --name $ACR_NAME --resource-group $RESOURCE_GROUP --sku Basic --location $REGION
          fi

      - name: Enable ACR Admin Credentials
        run: az acr update -n $ACR_NAME --admin-enabled true

      - name: Build and Push Backend Image (FastAPI)
        run: |
          az acr login --name $ACR_NAME

          if [ ! -f backend/main.py ]; then
            echo "Error: backend/main.py not found!"
            exit 1
          fi
          if [ ! -f backend/requirements.txt ]; then
            echo "Error: backend/requirements.txt not found!"
            exit 1
          fi

          docker build --no-cache -t $ACR_SERVER/$BACKEND_APP_NAME:$IMAGE_TAG -t $ACR_SERVER/$BACKEND_APP_NAME:latest ./backend
          docker push $ACR_SERVER/$BACKEND_APP_NAME:$IMAGE_TAG
          docker push $ACR_SERVER/$BACKEND_APP_NAME:latest

      - name: Ensure Azure Container Apps Environment Exists
        run: |
          if ! az containerapp env show --name $ENVIRONMENT_NAME --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            echo "Creating container apps environment..."
            az containerapp env create \
              --name $ENVIRONMENT_NAME \
              --resource-group $RESOURCE_GROUP \
              --location $REGION
          fi

      - name: Deploy or Update Backend Container App
        run: |
          if ! az containerapp show --name $BACKEND_APP_NAME --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            echo "Creating backend container app..."
            az containerapp create \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ENVIRONMENT_NAME" \
              --image "$ACR_SERVER/$BACKEND_APP_NAME:$IMAGE_TAG" \
              --cpu 1.0 \
              --memory 2.0Gi \
              --ingress external \
              --target-port 8080 \
              --min-replicas 1 \
              --max-replicas 3 \
              --registry-server "$ACR_SERVER" \
              --registry-username "$(az acr credential show --name $ACR_NAME --query 'username' -o tsv)" \
              --registry-password "$(az acr credential show --name $ACR_NAME --query 'passwords[0].value' -o tsv)" \
              --env-vars \
                DATABASE_SERVER="${{ secrets.DATABASE_SERVER }}" \
                DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
                DATABASE_USER="${{ secrets.DATABASE_USER }}" \
                DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
                ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
                CLAUDE_MODEL="claude-sonnet-4-20250514" \
                CLAUDE_MAX_TOKENS="8000" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
                AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
                AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
                AZURE_OPENAI_MAX_TOKENS="16384" \
                AZURE_OPENAI_TEMPERATURE="1.0" \
                AZURE_AI_PROJECT_ENDPOINT="${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}" \
                BING_GROUNDING_CONNECTION_ID="${{ secrets.BING_GROUNDING_CONNECTION_ID }}" \
                BING_SEARCH_API_KEY="${{ secrets.BING_SEARCH_API_KEY }}" \
                BING_SEARCH_ENDPOINT="https://api.bing.microsoft.com/v7.0/search" \
                FABRIC_CLIENT_ID="${{ secrets.FABRIC_CLIENT_ID }}" \
                FABRIC_TENANT_ID="${{ secrets.FABRIC_TENANT_ID }}" \
                FABRIC_CLIENT_SECRET="${{ secrets.FABRIC_CLIENT_SECRET }}" \
                WORKSPACE_BACKEND_URL="${{ secrets.WORKSPACE_BACKEND_URL }}" \
                DISABLE_AUTH="false" \
                STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
                STORAGE_ACCOUNT_KEY="${{ secrets.STORAGE_ACCOUNT_KEY }}"
          else
            echo "Updating backend container app..."
            az containerapp update \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_SERVER/$BACKEND_APP_NAME:$IMAGE_TAG" \
              --set-env-vars \
                DATABASE_SERVER="${{ secrets.DATABASE_SERVER }}" \
                DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
                DATABASE_USER="${{ secrets.DATABASE_USER }}" \
                DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
                ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
                AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
                AZURE_AI_PROJECT_ENDPOINT="${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}" \
                BING_GROUNDING_CONNECTION_ID="${{ secrets.BING_GROUNDING_CONNECTION_ID }}" \
                BING_SEARCH_API_KEY="${{ secrets.BING_SEARCH_API_KEY }}" \
                FABRIC_CLIENT_ID="${{ secrets.FABRIC_CLIENT_ID }}" \
                FABRIC_TENANT_ID="${{ secrets.FABRIC_TENANT_ID }}" \
                FABRIC_CLIENT_SECRET="${{ secrets.FABRIC_CLIENT_SECRET }}" \
                WORKSPACE_BACKEND_URL="${{ secrets.WORKSPACE_BACKEND_URL }}" \
                STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
                STORAGE_ACCOUNT_KEY="${{ secrets.STORAGE_ACCOUNT_KEY }}"
          fi

      - name: Output Backend App URL
        run: |
          BACKEND_URL=$(az containerapp show --name $BACKEND_APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Backend is deployed at: https://$BACKEND_URL"
          echo "BACKEND_URL=https://$BACKEND_URL" >> $GITHUB_ENV

      - name: Health Check Backend
        run: |
          BACKEND_URL=$(az containerapp show --name $BACKEND_APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Waiting for backend to be ready..."
          sleep 30
          curl -f https://$BACKEND_URL/ || echo "Backend health check failed, but continuing..."

  FrontendDeployment:
    needs: [BackendDeployment]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-jay')
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      FRONTEND_APP_NAME: "fabric-pipeline-frontend"
      ENVIRONMENT_NAME: ${{ secrets.CONTAINER_ENV_NAME }}
      ACR_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      REGION: "eastus"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Image Tag with Timestamp
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Backend URL
        run: |
          BACKEND_URL=$(az containerapp show --name fabric-pipeline-backend --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "BACKEND_URL=https://$BACKEND_URL" >> $GITHUB_ENV

      - name: Ensure ACR Exists
        run: |
          if ! az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            az acr create --name $ACR_NAME --resource-group $RESOURCE_GROUP --sku Basic --location $REGION
          fi

      - name: Enable ACR Admin Credentials
        run: az acr update -n $ACR_NAME --admin-enabled true

      - name: Build and Push Frontend Image
        run: |
          az acr login --name $ACR_NAME

          if [ ! -f frontend/Dockerfile ]; then
            echo "Error: frontend/Dockerfile not found!"
            exit 1
          fi

          echo "Building frontend with backend URL: $BACKEND_URL"

          docker build --no-cache \
            --build-arg REACT_APP_API_URL="$BACKEND_URL" \
            --build-arg REACT_APP_WORKSPACE_API_URL="$BACKEND_URL" \
            -t $ACR_SERVER/$FRONTEND_APP_NAME:$IMAGE_TAG \
            -t $ACR_SERVER/$FRONTEND_APP_NAME:latest \
            ./frontend

          docker push $ACR_SERVER/$FRONTEND_APP_NAME:$IMAGE_TAG
          docker push $ACR_SERVER/$FRONTEND_APP_NAME:latest

      - name: Ensure Azure Container Apps Environment Exists
        run: |
          if ! az containerapp env show --name $ENVIRONMENT_NAME --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            az containerapp env create \
              --name $ENVIRONMENT_NAME \
              --resource-group $RESOURCE_GROUP \
              --location $REGION
          fi

      - name: Deploy or Update Frontend Container App
        run: |
          if ! az containerapp show --name $FRONTEND_APP_NAME --resource-group $RESOURCE_GROUP > /dev/null 2>&1; then
            az containerapp create \
              --name "$FRONTEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ENVIRONMENT_NAME" \
              --image "$ACR_SERVER/$FRONTEND_APP_NAME:$IMAGE_TAG" \
              --cpu 0.5 \
              --memory 1.0Gi \
              --ingress external \
              --target-port 8080 \
              --min-replicas 1 \
              --max-replicas 3 \
              --registry-server "$ACR_SERVER" \
              --registry-username "$(az acr credential show --name $ACR_NAME --query 'username' -o tsv)" \
              --registry-password "$(az acr credential show --name $ACR_NAME --query 'passwords[0].value' -o tsv)" \
              --env-vars \
                REACT_APP_API_URL="$BACKEND_URL" \
                REACT_APP_WORKSPACE_API_URL="$BACKEND_URL" \
                PORT="8080"
          else
            az containerapp update \
              --name "$FRONTEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_SERVER/$FRONTEND_APP_NAME:$IMAGE_TAG" \
              --set-env-vars \
                REACT_APP_API_URL="$BACKEND_URL" \
                REACT_APP_WORKSPACE_API_URL="$BACKEND_URL" \
                PORT="8080"
          fi

      - name: Output Frontend App URL
        run: |
          FRONTEND_URL=$(az containerapp show --name $FRONTEND_APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Frontend is deployed at: https://$FRONTEND_URL"
          echo "FRONTEND_URL=https://$FRONTEND_URL" >> $GITHUB_ENV

      - name: Update Backend CORS Configuration
        run: |
          FRONTEND_URL=$(az containerapp show --name $FRONTEND_APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Updating backend CORS to allow: https://$FRONTEND_URL"
          # Note: You may need to restart the backend or implement dynamic CORS

      - name: Health Check Frontend
        run: |
          FRONTEND_URL=$(az containerapp show --name $FRONTEND_APP_NAME --resource-group $RESOURCE_GROUP --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Waiting for frontend to be ready..."
          sleep 30
          curl -f https://$FRONTEND_URL/health || curl -f https://$FRONTEND_URL/ || echo "Frontend health check failed, but continuing..."

  DeploymentSummary:
    needs: [SonarQubeAnalysis, BackendDeployment, FrontendDeployment]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-jay')
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Deployment URLs and Code Quality Summary
        run: |
          BACKEND_URL=$(az containerapp show --name fabric-pipeline-backend --resource-group ${{ secrets.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          FRONTEND_URL=$(az containerapp show --name fabric-pipeline-frontend --resource-group ${{ secrets.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)

          # Fetch SonarQube metrics for summary
          SONAR_URL="${{ secrets.SONAR_HOST_URL }}"
          PROJECT_KEY="fabric-data-pipeline-automation"

          # Get quality gate status
          QUALITY_GATE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${SONAR_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" \
            | jq -r '.projectStatus.status // "UNKNOWN"' || echo "N/A")

          # Get key metrics
          METRICS=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${SONAR_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=bugs,vulnerabilities,code_smells,coverage" \
            | jq -r '.component.measures' || echo "[]")

          BUGS=$(echo "$METRICS" | jq -r '.[] | select(.metric=="bugs") | .value // "N/A"' || echo "N/A")
          VULNERABILITIES=$(echo "$METRICS" | jq -r '.[] | select(.metric=="vulnerabilities") | .value // "N/A"' || echo "N/A")
          CODE_SMELLS=$(echo "$METRICS" | jq -r '.[] | select(.metric=="code_smells") | .value // "N/A"' || echo "N/A")
          COVERAGE=$(echo "$METRICS" | jq -r '.[] | select(.metric=="coverage") | .value // "N/A"' || echo "N/A")

          echo "=========================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo ""
          echo "Backend URL:  https://$BACKEND_URL"
          echo "Frontend URL: https://$FRONTEND_URL"
          echo ""
          echo "=========================================="
          echo "  CODE QUALITY SUMMARY"
          echo "=========================================="
          echo "Quality Gate: ${QUALITY_GATE}"
          echo "Bugs:         ${BUGS}"
          echo "Vulnerabilities: ${VULNERABILITIES}"
          echo "Code Smells:  ${CODE_SMELLS}"
          echo "Coverage:     ${COVERAGE}%"
          echo ""
          echo "View full report: ${SONAR_URL}/dashboard?id=${PROJECT_KEY}"
          echo ""
          echo "=========================================="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=========================================="
